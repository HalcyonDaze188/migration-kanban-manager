const TEAM=[

  {name:'Sayee',     ini:'SS',clr:'#8B5CF6'},

/* Source of truth: data from 2026 Migration Tracker spreadsheet */

    {id:'seo',       status:'on-hold',     currentTask:'3.1 Deployment to Artie Dev',          pct:43, rag:'amber', assignee:'Hanz',       comment:'Ready for Artie Dev deployment. Team are prioritising Print Headline V2 before progressing to Methode deployment.', lastUpdated:new Date().toISOString()},
    {id:'standfirst',status:'on-hold',     currentTask:'3.1 Deployment to Artie Dev',          pct:43, rag:'amber', assignee:'Hanz',       comment:'Ready for Artie Dev deployment. Team are prioritising Print Headline V2 before progressing to Methode deployment.', lastUpdated:new Date().toISOString()},
    {id:'print-hl',  status:'in-progress', currentTask:'2.4 Prompt QA + iteration hypercycle', pct:22, rag:'amber', assignee:'Sayee',      comment:'Ironing out last issues in the prompt (character count).', lastUpdated:new Date().toISOString()},
    {id:'story',     status:'in-progress', currentTask:'2.1 Model Selection',                  pct:18, rag:'green', assignee:'Erin Nixon', comment:'Gemini 3.1 the likely model to progress. Benchmarking not required.', lastUpdated:new Date().toISOString()},
    {id:'ext-hl',    status:'in-progress', currentTask:'1.2 Story Sourcing & output set-up',   pct:4,  rag:'green', assignee:'Tony',       comment:'Erin is updating the scoring tool to test across all 6 models.', lastUpdated:new Date().toISOString()},

    {id:'sports',    status:'blocked',     currentTask:'1.2 Story Sourcing & output set-up',   pct:4,  rag:'red',   assignee:'Sayee',      comment:'On hold pending legal discussion/confirmation. Sayee is setting up the notebook in the meantime.', lastUpdated:new Date().toISOString()},
    {id:'press',     status:'blocked',     currentTask:'1.2 Story Sourcing & output set-up',   pct:4,  rag:'red',   assignee:'Sayee',      comment:'On hold pending legal discussion/confirmation. Sayee is setting up the notebook in the meantime.', lastUpdated:new Date().toISOString()},
    {id:'bullet',    status:'in-progress', currentTask:'2.3 Benchmarking',                     pct:18, rag:'green', assignee:'Rocky',      comment:'Benchmarking underway with Claude 4.6 model selected.', lastUpdated:new Date().toISOString()},
  ];

/* ── Firebase sync ── */
function useSync(){
  const[ss,setSS]=useState(firebaseReady?'connecting':'local');
  const rr=useRef([]);
  const wr=useCallback((p,d)=>{if(db)db.ref(FB+'/'+p).set(d).catch(()=>setSS('disconnected'));},[]);
  const li=useCallback((p,cb)=>{
    if(!db)return()=>{};
    const ref=db.ref(FB+'/'+p);
    ref.on('value',s=>{setSS('connected');cb(s.val());},()=>{setSS('disconnected');cb(null);});
    rr.current.push(ref);
    return()=>ref.off();
  },[]);
  useEffect(()=>{
    if(!db)return;
    const r=db.ref('.info/connected');
    r.on('value',s=>setSS(s.val()?'connected':'disconnected'));
    return()=>{r.off();rr.current.forEach(r=>r.off());};
  },[]);
  return{ss,wr,li,fb:firebaseReady};
}

const fmtRel=iso=>{
  const d=new Date(iso);const m=Math.floor((Date.now()-d)/6e4);
  if(m<1)return'now';if(m<60)return m+'m';
  const h=Math.floor(m/60);if(h<24)return h+'h';
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
};

/* ── Avatar ── */
const Av=({name,sz=18})=>{
  const m=TEAM_IX[name];
  return<div title={name} style={{width:sz,height:sz,fontSize:sz*.42,background:m?.clr||'#9CA3AF',borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,flexShrink:0}}>
    {m?.ini||(name||'?').slice(0,2).toUpperCase()}
  </div>;
};

/* ── Progress bar ── */
const ProgressBar=({pct,clr})=>(
  <div style={{width:'100%',height:3,background:'var(--border-s)',borderRadius:99,overflow:'hidden',marginTop:2}}>
    <div style={{width:pct+'%',height:'100%',background:clr||'var(--accent)',borderRadius:99,transition:'width .3s'}}/>
  </div>
);

/* ── Status panel / KPIs ── */
const StatusPanel=({cards})=>{
  const done    =cards.filter(c=>c.status==='done').length;
  const blocked =cards.filter(c=>c.status==='blocked').length;
  const onHold  =cards.filter(c=>c.status==='on-hold').length;
  const inProg  =cards.filter(c=>c.status==='in-progress').length;
  const avgPct  =cards.length?Math.round(cards.reduce((s,c)=>s+(c.pct||0),0)/cards.length):0;
  return<div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
    {[
      {l:'Avg Progress', v:avgPct+'%', c:blocked>0?'#B91C1C':'var(--accent)'},
      {l:'In Progress',  v:inProg,     c:'#2563EB'},
      {l:'On Hold',      v:onHold,     c:'#D97706'},
      {l:'Blocked',      v:blocked,    c:blocked?'#B91C1C':'var(--t4)'},
      {l:'Done',         v:done,       c:'#16A34A'},
    ].map(m=><div key={m.l} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 16px',flex:'1 1 80px',minWidth:72,boxShadow:'var(--sh)'}}>
      <div style={{fontSize:9,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.09em',marginBottom:5}}>{m.l}</div>
      <div style={{fontSize:20,fontWeight:700,color:m.c,fontVariantNumeric:'tabular-nums',lineHeight:1}}>{m.v}</div>
    </div>)}
  </div>;
};

/* ── Tool Card ── */
const ToolCard=({card,onUpdate,onDragStart})=>{
  const[open,setOpen]=useState(false);
  const[ed,setEd]=useState(false);
  const[comment,setCom]=useState(card.comment);
  const[assignee,setAs]=useState(card.assignee);
  const[rag,setRag]=useState(card.rag);
  const[currentTask,setTask]=useState(card.currentTask);
  const[pct,setPct]=useState(card.pct);
  const tool=TOOL_IX[card.id];
  if(!tool)return null;
  const st=STATUS_IX[card.status];

  const save=()=>{
    const ch={};
    if(comment!==card.comment)ch.comment=comment;
    if(assignee!==card.assignee)ch.assignee=assignee;
    if(rag!==card.rag)ch.rag=rag;
    if(currentTask!==card.currentTask)ch.currentTask=currentTask;
    if(pct!==card.pct)ch.pct=Number(pct);
    if(Object.keys(ch).length)onUpdate(card.id,ch);
    setEd(false);setOpen(false);
  };

  return<div draggable onDragStart={e=>{onDragStart(e,card.id);e.dataTransfer.effectAllowed='move';}}
    style={{position:'relative',background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${tool.clr}`,borderRadius:10,padding:'12px 12px 10px',display:'flex',flexDirection:'column',gap:9,cursor:'grab',transition:'box-shadow .15s,background .1s',boxShadow:'var(--card-sh)'}}
    onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,0.10)';e.currentTarget.style.background='var(--card-h)';}}
    onMouseLeave={e=>{e.currentTarget.style.boxShadow='var(--card-sh)';e.currentTarget.style.background='var(--card)';}}>

    {/* Tags row */}
    <div style={{display:'flex',flexWrap:'wrap',gap:5,alignItems:'center'}}>
      <span style={{background:'var(--accent-bg)',color:'var(--accent)',padding:'2px 7px',borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:'.03em'}}>PH {tool.phase}</span>
      <span style={{background:RAG_STYLE[card.rag].bg,color:RAG_STYLE[card.rag].text,padding:'2px 7px',borderRadius:4,fontSize:10,fontWeight:700,textTransform:'capitalize'}}>{card.rag}</span>
    </div>

    {/* Tool name */}
    <div>
      <span onClick={()=>{setOpen(!open);if(ed)setEd(false);}}
        style={{fontSize:14,fontWeight:700,color:'var(--t1)',lineHeight:'20px',cursor:'pointer',letterSpacing:'-.01em',display:'block'}}>
        {tool.name}
      </span>
      {/* Current task */}
      <span style={{fontSize:11,color:'var(--t2)',lineHeight:'16px',display:'block',marginTop:3,fontWeight:500}}>
        {card.currentTask}
      </span>
    </div>

    {/* Progress bar */}
    <div>
      <ProgressBar pct={card.pct} clr={st?.accent}/>
      <span style={{fontSize:10,color:'var(--t3)',marginTop:4,display:'block'}}>{card.pct}% complete</span>
    </div>

    {/* Comment preview */}
    {!open&&card.comment&&
      <span style={{fontSize:11,color:'var(--t2)',lineHeight:'15px',overflow:'hidden',textOverflow:'ellipsis',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
        {card.comment}
      </span>}

    {/* Expanded view */}
    {open&&!ed&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
      <div style={{height:1,background:'var(--border-s)'}}/>
      {card.comment&&<p style={{fontSize:12,color:'var(--t1)',lineHeight:'18px'}}>{card.comment}</p>}
      {tool.jira&&<a href={JIRA+'/'+tool.jira} target="_blank" rel="noopener noreferrer"
        style={{fontSize:11,color:'var(--accent)',textDecoration:'none',fontWeight:600}}>{tool.jira} ↗</a>}
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:11,color:'var(--t2)',fontWeight:500,flexShrink:0}}>Move to:</span>
        <select value={card.status} onChange={e=>onUpdate(card.id,{status:e.target.value})}
          style={{fontSize:11,flex:1,background:'var(--surface)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:6,padding:'4px 6px',outline:'none'}}>
          {STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
        </select>
      </div>
      <button onClick={()=>{setEd(true);setCom(card.comment);setAs(card.assignee);setRag(card.rag);setTask(card.currentTask);setPct(card.pct);}}
        style={{fontSize:10,fontWeight:700,color:'var(--accent)',background:'none',border:'none',cursor:'pointer',textAlign:'left',padding:0,letterSpacing:'.04em'}}>
        EDIT DETAILS
      </button>
    </div>}

    {/* Edit form */}
    {ed&&<div style={{display:'flex',flexDirection:'column',gap:8}} onClick={e=>e.stopPropagation()}>
      <div style={{height:1,background:'var(--border-s)'}}/>
      {[
        {l:'Current Task', el:<select value={currentTask} onChange={e=>setTask(e.target.value)} style={iSt}>{PIPELINE_TASKS.map(t=><option key={t} value={t}>{t}</option>)}</select>},
        {l:'% Complete',   el:<input type="number" min="0" max="100" value={pct} onChange={e=>setPct(e.target.value)} style={iSt}/>},
        {l:'Assignee',     el:<select value={assignee} onChange={e=>setAs(e.target.value)} style={iSt}>{TEAM.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}</select>},
        {l:'RAG',          el:<select value={rag} onChange={e=>setRag(e.target.value)} style={iSt}><option value="green">Green</option><option value="amber">Amber</option><option value="red">Red</option></select>},
        {l:'Note',         el:<textarea value={comment} onChange={e=>setCom(e.target.value)} rows={2} style={{...iSt,resize:'none'}}/>},
      ].map(r=><div key={r.l}><div style={lSt}>{r.l}</div>{r.el}</div>)}
      <div style={{display:'flex',gap:8,marginTop:2}}>
        <button onClick={save} style={{flex:1,fontSize:11,fontWeight:700,background:'var(--accent)',color:'#fff',padding:'7px 0',borderRadius:6,border:'none',cursor:'pointer'}}>Save</button>
        <button onClick={()=>setEd(false)} style={{flex:1,fontSize:11,fontWeight:600,background:'transparent',color:'var(--t2)',padding:'7px 0',borderRadius:6,border:'1px solid var(--border-s)',cursor:'pointer'}}>Cancel</button>
      </div>
    </div>}

    {/* Footer */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:2}}>
      <div style={{display:'flex',alignItems:'center',gap:7}}>
        <Av name={card.assignee} sz={16}/>
        <span style={{fontSize:11,color:'var(--t2)',fontWeight:500}}>{card.assignee||'Unassigned'}</span>
      </div>
      <span style={{fontSize:10,color:'var(--t3)'}}>{fmtRel(card.lastUpdated)}</span>
    </div>
  </div>;
};

const lSt={fontSize:10,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4,display:'block'};
const iSt={width:'100%',fontSize:11,padding:'5px 8px',background:'var(--surface)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:6,outline:'none'};

/* ── Board — columns = statuses ── */
const Board=({cards,onUpdate})=>{
  const[dragOver,setDO]=useState(null);
  const dragId=useRef(null);
  const onDS=useCallback((e,id)=>{dragId.current=id;e.dataTransfer.setData('text/plain',id);},[]);
  const onDrop=useCallback((e,key)=>{
    e.preventDefault();setDO(null);
    const id=e.dataTransfer.getData('text/plain')||dragId.current;
    if(id)onUpdate(id,{status:key});
    dragId.current=null;
  },[onUpdate]);

  return<div style={{display:'flex',gap:14,overflowX:'auto',paddingBottom:12,flex:1,minHeight:0,alignItems:'flex-start'}}>
    {STATUSES.map(status=>{
      const col=cards.filter(c=>c.status===status.key);
      const isO=dragOver===status.key;
      return<div key={status.key}
        style={{flexShrink:0,width:240,display:'flex',flexDirection:'column',background:'var(--surface)',border:`1px solid ${isO?status.accent:'var(--border)'}`,borderRadius:12,transition:'border-color .15s,box-shadow .15s',boxShadow:isO?`0 0 0 3px ${status.bg}`:'var(--sh)',overflow:'hidden'}}
        onDragOver={e=>{e.preventDefault();setDO(status.key);}} onDragLeave={()=>setDO(null)} onDrop={e=>onDrop(e,status.key)}>

        {/* Column header */}
        <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border-s)',display:'flex',alignItems:'center',gap:8,background:'var(--card)'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:status.accent,flexShrink:0}}/>
          <span style={{fontSize:12,fontWeight:700,color:'var(--t1)',flex:1,letterSpacing:'-.01em'}}>{status.label}</span>
          {col.length>0&&
            <span style={{fontSize:10,fontWeight:700,color:status.accent,background:status.bg,padding:'1px 8px',borderRadius:99,flexShrink:0,border:`1px solid ${status.accent}30`}}>{col.length}</span>}
        </div>

        {/* Cards */}
        <div style={{flex:1,overflowY:'auto',padding:10,display:'flex',flexDirection:'column',gap:10}}>
          {col.map(c=><ToolCard key={c.id} card={c} onUpdate={onUpdate} onDragStart={onDS}/>)}
          {col.length===0&&
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:64,fontSize:11,color:'var(--t4)',border:'1px dashed var(--border-s)',borderRadius:8}}>Drop here</div>}
        </div>
      </div>;
    })}
  </div>;
};

/* ── Filters ── */
const Filters=({f,set,clear,cnt})=>{
  const s={fontSize:12,padding:'5px 10px',background:'var(--card)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:8,outline:'none',height:30};
  return<div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:14}}>
    <input placeholder="Search tools or owner…" value={f.q} onChange={e=>set('q',e.target.value)} style={{...s,width:170}}/>
    <select value={f.phase}    onChange={e=>set('phase',e.target.value)}    style={s}><option value="">All Phases</option><option value="1">Phase 1</option><option value="2">Phase 2</option><option value="3">Phase 3</option></select>
    <select value={f.rag}      onChange={e=>set('rag',e.target.value)}      style={s}><option value="">All RAG</option><option value="green">Green</option><option value="amber">Amber</option><option value="red">Red</option></select>
    <select value={f.assignee} onChange={e=>set('assignee',e.target.value)} style={s}><option value="">All Owners</option>{TEAM.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}</select>
    {cnt>0&&<button onClick={clear} style={{fontSize:11,fontWeight:700,color:'var(--accent)',background:'var(--accent-bg)',padding:'0 12px',borderRadius:8,border:'none',cursor:'pointer',height:30}}>Clear ({cnt})</button>}
  </div>;
};

/* ── Header ── */
const Header=({ss,onReset,onCsv,light,onToggle})=>(
  <header style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:18,flexWrap:'wrap',gap:12}}>
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <div style={{width:36,height:36,borderRadius:10,background:'#4F46E5',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <span style={{color:'#fff',fontSize:10,fontWeight:800,letterSpacing:'.05em'}}>NCA</span>
      </div>
      <div>
        <h1 style={{fontSize:18,fontWeight:700,color:'var(--t1)',letterSpacing:'-.02em',lineHeight:1}}>E2E Model Migration</h1>
        <p style={{fontSize:11,color:'var(--t2)',marginTop:3}}>Editorial AI — Pipeline Kanban</p>
      </div>
    </div>

    <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--card)',padding:'7px 16px',borderRadius:999,border:'1px solid var(--border-s)',boxShadow:'var(--sh)'}}>
      <span style={{fontSize:13,fontWeight:700,color:DAYS_LEFT<30?'#B91C1C':DAYS_LEFT<60?'#D97706':'var(--t1)'}}>{DAYS_LEFT} days remaining</span>
      <span style={{fontSize:12,color:'var(--t3)'}}>· May 2026</span>
    </div>

    <div style={{display:'flex',alignItems:'center',gap:8}}>
      {[{l:light?'Dark':'Light',fn:onToggle},{l:'CSV',fn:onCsv},{l:'Reset',fn:()=>{if(confirm('Reset to defaults?'))onReset();}}].map(b=>
        <button key={b.l} onClick={b.fn} style={{fontSize:11,fontWeight:600,padding:'0 14px',background:'var(--card)',border:'1px solid var(--border-s)',color:'var(--t2)',borderRadius:8,cursor:'pointer',height:30}}>{b.l}</button>
      )}
      <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--card)',border:'1px solid var(--border-s)',padding:'0 12px',borderRadius:8,height:30}}>
        <span style={{width:7,height:7,borderRadius:'50%',flexShrink:0,background:ss==='connected'?'#16A34A':ss==='disconnected'?'#DC2626':'#9CA3AF'}}/>
        <span style={{fontSize:10,fontWeight:700,color:ss==='connected'?'#16A34A':ss==='disconnected'?'#DC2626':'var(--t2)',letterSpacing:'.05em'}}>{ss==='connected'?'LIVE':ss==='disconnected'?'OFFLINE':'LOCAL'}</span>
      </div>
    </div>
  </header>
);

/* ── CSV export ── */
function doCSV(cards){
  const esc=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;};
  const h=['Tool','Phase','Status','Current Task','% Complete','RAG','Assignee','Comment','Updated'];
  const rows=cards.map(c=>{const t=TOOL_IX[c.id];return[t?.name,t?.phase,STATUS_IX[c.status]?.label,c.currentTask,c.pct,c.rag,c.assignee,c.comment,new Date(c.lastUpdated).toLocaleString('en-AU')];});
  const out=[h.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))].join('\r\n');
  const b=new Blob(['\uFEFF'+out],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nca-migration-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);
}

/* ── App ── */
const EF={q:'',phase:'',rag:'',assignee:''};
const App=()=>{
  const[cards,setCards]=useState([]);
  const[loading,setLoading]=useState(true);
  const[f,setF]=useState(EF);
  const skip=useRef(false);
  const[light,setLight]=useState(()=>{try{return localStorage.getItem('nca-theme')!=='dark';}catch{return true;}});
  useEffect(()=>{document.body.classList.toggle('dark',!light);try{localStorage.setItem('nca-theme',light?'light':'dark');}catch{}},[light]);

  const{ss,wr,li,fb}=useSync();
  const persist=useCallback(c=>{try{localStorage.setItem(LS,JSON.stringify(c));}catch{}if(fb){skip.current=true;wr('cards',c);}},[fb,wr]);

  useEffect(()=>{
    if(fb){
      return li('cards',data=>{
        if(skip.current){skip.current=false;return;}
        const c=data&&Array.isArray(data)?data:data?Object.values(data):null;
        setCards(c||defaults());
        if(!c)wr('cards',defaults());
        setLoading(false);
      });
    }else{
      try{const r=localStorage.getItem(LS);setCards(r?JSON.parse(r):defaults());}catch{setCards(defaults());}
      setLoading(false);
    }
  },[fb,li,wr]);

  const update=useCallback((id,ch)=>{
    setCards(prev=>{const next=prev.map(c=>c.id===id?{...c,...ch,lastUpdated:new Date().toISOString()}:c);persist(next);return next;});
  },[persist]);

  const reset=useCallback(()=>{const d=defaults();setCards(d);persist(d);},[persist]);

  const filtered=useMemo(()=>{
    let r=[...cards];
    if(f.q){const q=f.q.toLowerCase();r=r.filter(c=>(TOOL_IX[c.id]?.name||'').toLowerCase().includes(q)||(c.assignee||'').toLowerCase().includes(q));}
    if(f.phase)    r=r.filter(c=>TOOL_IX[c.id]?.phase===Number(f.phase));
    if(f.rag)      r=r.filter(c=>c.rag===f.rag);
    if(f.assignee) r=r.filter(c=>c.assignee===f.assignee);
    return r;
  },[cards,f]);

  const cnt=Object.entries(f).filter(([,v])=>v!=='').length;

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)'}}><span style={{color:'var(--t3)',fontSize:13,fontWeight:500}}>Loading board…</span></div>;

  return<div style={{display:'flex',flexDirection:'column',height:'100vh',padding:'22px 26px 10px',maxWidth:2400,margin:'0 auto'}}>
    <Header ss={ss} onReset={reset} onCsv={()=>doCSV(cards)} light={light} onToggle={()=>setLight(p=>!p)}/>
    <StatusPanel cards={cards}/>
    <Filters f={f} set={(k,v)=>setF(p=>({...p,[k]:v}))} clear={()=>setF(EF)} cnt={cnt}/>
    <Board cards={filtered} onUpdate={update}/>
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
