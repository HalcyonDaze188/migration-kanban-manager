/* ── Firebase sync ── */
function useSync(){
  const[ss,setSS]=useState(firebaseReady?'connecting':'local');
  const rr=useRef([]);
  const wr=useCallback((p,d)=>{if(db)db.ref(FB+'/'+p).set(d).catch(()=>setSS('disconnected'));},[]);
  const li=useCallback((p,cb)=>{
    if(!db)return()=>{};
    const ref=db.ref(FB+'/'+p);
    ref.on('value',s=>{setSS('connected');cb(s.val());},()=>{setSS('disconnected');cb(null);});
    rr.current.push(ref);return()=>ref.off();
  },[]);
  useEffect(()=>{if(!db)return;const r=db.ref('.info/connected');r.on('value',s=>setSS(s.val()?'connected':'disconnected'));return()=>{r.off();rr.current.forEach(r=>r.off());};},[]);
  return{ss,wr,li,fb:firebaseReady};
}

  return<div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>

      {l:'Overall',v:pct+'%',c:blk>0?'#DC2626':'var(--accent)'},

/* ── Card Modal ──
   Full-screen centred overlay with all card fields editable.
   Shows: Task, Tool, Phase/Stage, RAG, Assignee, Start Date, End Date, Jira, Dependencies, Notes, Last Updated.
*/
const CardModal=({card,onUpdate,onClose})=>{
  const tool=TOOL_IX[card.toolId];
  const task=TASK_IX[card.taskId];
  if(!tool||!task)return null;

  const[assignee,setAs]=useState(card.assignee||'');
  const[rag,setRag]=useState(card.rag||'amber');
  const[endDate,setEnd]=useState(card.endDate||'');
  const[startDate,setStart]=useState(card.startDate||'');
  const[notes,setNotes]=useState(card.notes||'');

  const status=STATUSES.find(s=>s.key===card.status);
  const overdue=isOverdue(card.endDate,card.status);
  const dep=DEPS[card.taskId];
  const depTask=dep?TASK_IX[dep]:null;

  const save=()=>{
    const ch={};
    if(assignee!==card.assignee)ch.assignee=assignee;
    if(rag!==card.rag)ch.rag=rag;
    if(endDate!==card.endDate)ch.endDate=endDate;
    if(startDate!==(card.startDate||''))ch.startDate=startDate;
    if(notes!==card.notes)ch.notes=notes;
    if(Object.keys(ch).length)onUpdate(card.id,ch);
    onClose();
  };

  return<div onClick={onClose} style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.45)',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>

      {/* Header bar with tool colour */}
      <div style={{background:tool.clr,padding:'14px 20px',borderRadius:'14px 14px 0 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:'#fff',lineHeight:1.2}}>{task.label}</div>
          <div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.8)',marginTop:3}}>{tool.name}</div>
        </div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'#fff',width:28,height:28,borderRadius:8,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>x</button>
      </div>

      {/* Info chips row */}
      <div style={{padding:'12px 20px 0',display:'flex',gap:6,flexWrap:'wrap'}}>
        <span style={{fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:99,background:status?.bg||'var(--surface)',color:status?.clr||'var(--t2)',border:`1px solid ${status?.clr||'var(--border)'}30`}}>{status?.label||card.status}</span>
        <span style={{fontSize:10,fontWeight:600,padding:'3px 10px',borderRadius:99,background:'var(--accent-bg)',color:'var(--accent)'}}>Phase {tool.phase}</span>
        <span style={{fontSize:10,fontWeight:600,padding:'3px 10px',borderRadius:99,background:'var(--surface)',color:'var(--t2)',border:'1px solid var(--border)'}}>{STAGE_LABEL(card.taskId)}</span>
        {overdue&&<span style={{fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:99,background:'#FEE2E2',color:'#DC2626'}}>Overdue</span>}
      </div>

      {/* Fields grid */}
      <div style={{padding:'16px 20px',display:'flex',flexDirection:'column',gap:14}}>

        {/* RAG */}
        <div>
          <div style={lSt}>RAG Status</div>
          <div style={{display:'flex',gap:8}}>
            {['green','amber','red'].map(r=><button key={r} onClick={()=>setRag(r)} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',borderRadius:8,background:rag===r?RAG_CLR[r]+'18':'transparent',border:rag===r?`2px solid ${RAG_CLR[r]}`:'2px solid var(--border)',cursor:'pointer',transition:'all .12s'}}>
              <span style={{width:10,height:10,borderRadius:'50%',background:RAG_CLR[r]}}/>
              <span style={{fontSize:11,fontWeight:rag===r?700:500,color:rag===r?RAG_CLR[r]:'var(--t2)',textTransform:'capitalize'}}>{r}</span>
            </button>)}
          </div>
        </div>

        {/* Assignee */}
        <div>
          <div style={lSt}>Assignee</div>
          <select value={assignee} onChange={e=>setAs(e.target.value)} style={iSt}>
            <option value="">Unassigned</option>
            {TEAM.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}
          </select>
        </div>

        {/* Dates row */}
        <div style={{display:'flex',gap:12}}>
          <div style={{flex:1}}>
            <div style={lSt}>Start Date</div>
            <input type="date" value={startDate} onChange={e=>setStart(e.target.value)} style={iSt}/>
          </div>
          <div style={{flex:1}}>
            <div style={lSt}>End Date</div>
            <input type="date" value={endDate} onChange={e=>setEnd(e.target.value)} style={{...iSt,color:overdue?'#DC2626':'var(--t1)'}}/>
          </div>
        </div>

        {/* Jira */}
        {tool.jira&&<div>
          <div style={lSt}>Jira Ticket</div>
          <a href={`${JIRA}/${tool.jira}`} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:'var(--accent)',fontWeight:600,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:4}}>
            {tool.jira} <span style={{fontSize:10}}>&#8599;</span>
          </a>
        </div>}

        {/* Dependencies */}
        <div>
          <div style={lSt}>Dependencies</div>
          {depTask
            ?<span style={{fontSize:12,color:'var(--t2)'}}>{depTask.label}</span>
            :<span style={{fontSize:12,color:'var(--t4)',fontStyle:'italic'}}>None (first task)</span>
          }
        </div>

        {/* Notes */}
        <div>
          <div style={lSt}>Notes</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={4} placeholder="Add notes..." style={{...iSt,resize:'vertical',minHeight:60}}/>
        </div>

        {/* Last updated */}
        {card.lastUpdated&&<div style={{fontSize:10,color:'var(--t4)'}}>Last updated: {fmtRel(card.lastUpdated)}</div>}
      </div>

      {/* Footer buttons */}
      <div style={{padding:'0 20px 16px',display:'flex',gap:8}}>
        <button onClick={save} style={{flex:1,fontSize:12,fontWeight:700,background:'var(--accent)',color:'#fff',padding:'9px 0',borderRadius:8,border:'none',cursor:'pointer',transition:'opacity .12s'}}>Save Changes</button>
        <button onClick={onClose} style={{flex:1,fontSize:12,fontWeight:600,background:'transparent',color:'var(--t2)',padding:'9px 0',borderRadius:8,border:'1px solid var(--border-s)',cursor:'pointer'}}>Cancel</button>
      </div>
    </div>
  </div>;
};

/* ── Task Card ──
   Shows at a glance: Task name, Tool name (colour), RAG dot, End date, Assignee.
   Click to open full modal editor. Status changed by drag-and-drop only.
*/
const TaskCard=({card,onDragStart,onClick})=>{
  const tool=TOOL_IX[card.toolId];
  const task=TASK_IX[card.taskId];
  if(!tool||!task)return null;
  const overdue=isOverdue(card.endDate,card.status);

  return<div draggable onDragStart={e=>{onDragStart(e,card.id);e.dataTransfer.effectAllowed='move';}}
    onClick={()=>onClick(card)}
    style={{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${tool.clr}`,borderRadius:8,padding:'8px 10px',display:'flex',flexDirection:'column',gap:5,cursor:'pointer',transition:'box-shadow .12s',boxShadow:'var(--card-sh)'}}
    onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 3px 14px rgba(0,0,0,0.10)';}}
    onMouseLeave={e=>{e.currentTarget.style.boxShadow='var(--card-sh)';}}>

    {/* Row 1: Task name + RAG dot */}
    <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
      <span style={{width:7,height:7,borderRadius:'50%',background:RAG_CLR[card.rag],flexShrink:0,marginTop:4}}/>
      <span style={{fontSize:12,fontWeight:700,color:'var(--t1)',lineHeight:'16px',flex:1,letterSpacing:'-.01em'}}>
        {task.label}
      </span>
    </div>

    {/* Row 2: Tool name in colour */}
    <div style={{display:'flex',alignItems:'center',gap:5,paddingLeft:13}}>
      <span style={{fontSize:10,fontWeight:700,color:tool.clr}}>{tool.name}</span>
      {tool.jira&&<span style={{fontSize:9,color:'var(--t3)',fontFamily:'monospace'}}>{tool.jira}</span>}
    </div>

    {/* Row 3: Assignee + End date */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingLeft:13}}>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        {card.assignee?<><Av name={card.assignee} sz={14}/><span style={{fontSize:10,color:'var(--t2)'}}>{card.assignee}</span></>
        :<span style={{fontSize:10,color:'var(--t4)',fontStyle:'italic'}}>Unassigned</span>}
      </div>
      {card.endDate&&
        <span style={{fontSize:10,fontWeight:600,color:overdue?'#DC2626':'var(--t3)',background:overdue?'#FEE2E2':'transparent',padding:overdue?'1px 5px':0,borderRadius:4}}>
          {overdue?'Overdue · ':''}{fmtDate(card.endDate)}
        </span>}
    </div>

    {/* Notes preview */}
    {card.notes&&<div style={{paddingLeft:13}}><span style={{fontSize:10,color:'var(--t3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>{card.notes}</span></div>}
  </div>;
};

/* ── Board ── */
const Board=({cards,onUpdate})=>{
  const[dragOver,setDO]=useState(null);
  const[modalCard,setModal]=useState(null);
  const dragId=useRef(null);
  const onDS=useCallback((e,id)=>{dragId.current=id;e.dataTransfer.setData('text/plain',id);},[]);
  const onDrop=useCallback((e,key)=>{
    e.preventDefault();setDO(null);
    const id=e.dataTransfer.getData('text/plain')||dragId.current;
    if(id)onUpdate(id,{status:key});
    dragId.current=null;
  },[onUpdate]);

  /* Keep modal card in sync with cards array (e.g. after Firebase update) */
  const activeCard=modalCard?cards.find(c=>c.id===modalCard.id)||null:null;

  return<>
    <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:10,flex:1,minHeight:0,alignItems:'stretch'}}>
    {STATUSES.map(status=>{
      const col=cards.filter(c=>c.status===status.key);
      const isO=dragOver===status.key;
      return<div key={status.key}
        style={{flexShrink:0,flex:'1 1 0',minWidth:200,maxWidth:340,display:'flex',flexDirection:'column',background:'var(--surface)',border:`1px solid ${isO?status.clr:'var(--border)'}`,borderRadius:10,transition:'border-color .15s',boxShadow:isO?`0 0 0 2px ${status.bg}`:'var(--sh)',overflow:'hidden'}}
        onDragOver={e=>{e.preventDefault();setDO(status.key);}} onDragLeave={()=>setDO(null)} onDrop={e=>onDrop(e,status.key)}>

        <div style={{padding:'8px 10px',borderBottom:'1px solid rgba(255,255,255,0.1)',display:'flex',alignItems:'center',gap:7,background:'rgba(30,36,50,0.85)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',flexShrink:0,borderRadius:'9px 9px 0 0'}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:status.clr,flexShrink:0}}/>
          <span style={{fontSize:12,fontWeight:700,color:'#FFFFFF',flex:1}}>{status.label}</span>
          <span style={{fontSize:10,fontWeight:700,color:'#FFFFFF',background:'rgba(255,255,255,0.15)',padding:'1px 7px',borderRadius:99,border:'1px solid rgba(255,255,255,0.2)'}}>{col.length}</span>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:7,display:'flex',flexDirection:'column',gap:7}}>
          {col.map(c=><TaskCard key={c.id} card={c} onDragStart={onDS} onClick={setModal}/>)}
          {col.length===0&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:56,fontSize:11,color:'var(--t4)',border:'1px dashed var(--border-s)',borderRadius:6}}>Drop here</div>}
        </div>
      </div>;
    })}
    </div>
    {activeCard&&<CardModal card={activeCard} onUpdate={onUpdate} onClose={()=>setModal(null)}/>}
  </>;
};

/* ── Filters ── */
const Filters=({f,set,clear,cnt})=>{
  const s={fontSize:11,padding:'4px 8px',background:'var(--card)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:6,outline:'none',height:28};
  return<div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:12}}>
    <select value={f.tool} onChange={e=>set('tool',e.target.value)} style={{...s,fontWeight:f.tool?700:400}}>
      <option value="">All Tools</option>{TOOLS.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
    </select>
    <select value={f.phase} onChange={e=>set('phase',e.target.value)} style={s}><option value="">All Phases</option><option value="1">Phase 1</option><option value="2">Phase 2</option><option value="3">Phase 3</option></select>
    <select value={f.assignee} onChange={e=>set('assignee',e.target.value)} style={s}><option value="">All Owners</option>{TEAM.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}</select>
    <label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--t2)',cursor:'pointer',height:28}}><input type="checkbox" checked={f.hideDone} onChange={e=>set('hideDone',e.target.checked)}/> Hide Done</label>
    <label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--t2)',cursor:'pointer',height:28}}><input type="checkbox" checked={f.hideNS} onChange={e=>set('hideNS',e.target.checked)}/> Hide Not Started</label>
    {cnt>0&&<button onClick={clear} style={{fontSize:10,fontWeight:700,color:'var(--accent)',background:'var(--accent-bg)',padding:'0 10px',borderRadius:6,border:'none',cursor:'pointer',height:28}}>Clear ({cnt})</button>}
  </div>;
};

/* ── Header ── */
const Header=({ss,onReset,onCsv,light,onToggle})=>(
  <header style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:14,flexWrap:'wrap',gap:10}}>
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:32,height:32,borderRadius:8,background:'#4F46E5',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <span style={{color:'#fff',fontSize:9,fontWeight:800,letterSpacing:'.05em'}}>NCA</span>
      </div>
      <div>
        <h1 style={{fontSize:16,fontWeight:700,color:'var(--t1)',letterSpacing:'-.02em',lineHeight:1}}>E2E Model Migration</h1>
        <p style={{fontSize:10,color:'var(--t2)',marginTop:2}}>Editorial AI — Pipeline Kanban</p>
      </div>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--card)',padding:'5px 14px',borderRadius:999,border:'1px solid var(--border-s)',boxShadow:'var(--sh)'}}>
      <span style={{fontSize:12,fontWeight:700,color:DAYS_LEFT<30?'#DC2626':DAYS_LEFT<60?'#D97706':'var(--t1)'}}>{DAYS_LEFT} days</span>
      <span style={{fontSize:11,color:'var(--t3)'}}>· May 2026</span>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      {[{l:light?'Dark':'Light',fn:onToggle},{l:'CSV',fn:onCsv},{l:'Reset',fn:()=>{if(confirm('Reset to defaults?'))onReset();}}].map(b=>
        <button key={b.l} onClick={b.fn} style={{fontSize:10,fontWeight:600,padding:'0 12px',background:'var(--card)',border:'1px solid var(--border-s)',color:'var(--t2)',borderRadius:6,cursor:'pointer',height:28}}>{b.l}</button>
      )}
      <div style={{display:'flex',alignItems:'center',gap:5,background:'var(--card)',border:'1px solid var(--border-s)',padding:'0 10px',borderRadius:6,height:28}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:ss==='connected'?'#16A34A':ss==='disconnected'?'#DC2626':'#9CA3AF'}}/>
        <span style={{fontSize:9,fontWeight:700,color:ss==='connected'?'#16A34A':ss==='disconnected'?'#DC2626':'var(--t2)',letterSpacing:'.05em'}}>{ss==='connected'?'LIVE':ss==='disconnected'?'OFFLINE':'LOCAL'}</span>
      </div>
    </div>
  </header>
);

/* ── CSV ── */
function doCSV(cards){
  const esc=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;};
  const h=['Task','Tool','Phase','Status','RAG','End Date','Assignee','Notes'];
  const rows=cards.map(c=>{const t=TOOL_IX[c.toolId];const tk=TASK_IX[c.taskId];const st=STATUSES.find(s=>s.key===c.status);return[tk?.label,t?.name,t?.phase,st?.label,c.rag,c.endDate,c.assignee,c.notes];});
  const out=[h.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))].join('\r\n');
  const b=new Blob(['\uFEFF'+out],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nca-migration-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);
}

/* ── App ── */
const EF={tool:'',phase:'',assignee:'',hideDone:false,hideNS:false};
const App=()=>{
  const[cards,setCards]=useState([]);
  const[loading,setLoading]=useState(true);
  const[f,setF]=useState(EF);
  const skip=useRef(false);
  const[light,setLight]=useState(()=>{try{return localStorage.getItem('nca-theme')!=='dark';}catch{return true;}});
  useEffect(()=>{document.body.classList.toggle('dark',!light);try{localStorage.setItem('nca-theme',light?'light':'dark');}catch{}},[light]);

  const{ss,wr,li,fb}=useSync();
  const persist=useCallback(c=>{try{localStorage.setItem(LS,JSON.stringify(c));}catch{}if(fb){skip.current=true;wr('cards',c);}},[fb,wr]);

  useEffect(()=>{
    if(fb){
      return li('cards',data=>{
        if(skip.current){skip.current=false;return;}
        const c=data&&Array.isArray(data)?data:data?Object.values(data):null;
        setCards(c||defaults());
        if(!c)wr('cards',defaults());
        setLoading(false);
      });
    }else{
      try{const r=localStorage.getItem(LS);setCards(r?JSON.parse(r):defaults());}catch{setCards(defaults());}
      setLoading(false);
    }
  },[fb,li,wr]);

  const update=useCallback((id,ch)=>{
    setCards(prev=>{const next=prev.map(c=>c.id===id?{...c,...ch,lastUpdated:new Date().toISOString()}:c);persist(next);return next;});
  },[persist]);

  const reset=useCallback(()=>{const d=defaults();setCards(d);persist(d);},[persist]);

  const filtered=useMemo(()=>{
    let r=[...cards];
    if(f.tool)     r=r.filter(c=>c.toolId===f.tool);
    if(f.phase)    r=r.filter(c=>TOOL_IX[c.toolId]?.phase===Number(f.phase));
    if(f.assignee) r=r.filter(c=>c.assignee===f.assignee);
    if(f.hideDone) r=r.filter(c=>c.status!=='done');
    if(f.hideNS)   r=r.filter(c=>c.status!=='not-started');
    return r;
  },[cards,f]);

  const cnt=Object.entries(f).filter(([k,v])=>typeof v==='boolean'?v:v!=='').length;

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)'}}><span style={{color:'var(--t3)',fontSize:13}}>Loading board…</span></div>;

  return<div style={{display:'flex',flexDirection:'column',height:'100vh',padding:'20px 24px 10px',maxWidth:2400,margin:'0 auto'}}>
    <Header ss={ss} onReset={reset} onCsv={()=>doCSV(cards)} light={light} onToggle={()=>setLight(p=>!p)}/>
    <KPIs cards={cards}/>
    <Filters f={f} set={(k,v)=>setF(p=>({...p,[k]:v}))} clear={()=>setF(EF)} cnt={cnt}/>
    <Board cards={filtered} onUpdate={update}/>
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
