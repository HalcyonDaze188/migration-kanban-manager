<style>

  --border:rgba(0,0,0,0.07);--border-s:rgba(0,0,0,0.10);
  --t1:#1A1D23;--t2:#6B7280;--t3:#9CA3AF;--t4:#D1D5DB;

  --sh:0 1px 3px rgba(0,0,0,0.04);--card-sh:0 1px 2px rgba(0,0,0,0.05);
}
body.dark{
  --bg:#0f0f17;--surface:#161622;--card:#1e1e2e;--card-h:#252538;
  --border:rgba(255,255,255,0.07);--border-s:rgba(255,255,255,0.11);
  --t1:#E8E8F0;--t2:rgba(232,232,240,0.55);--t3:rgba(232,232,240,0.30);--t4:rgba(232,232,240,0.12);

body{background:var(--bg);color:var(--t1);transition:background .2s,color .2s}

<script>

  projectId:"deoples-migration-kanban",
  storageBucket:"deoples-migration-kanban.firebasestorage.app",
  messagingSenderId:"1035455964704",
  appId:"1:1035455964704:web:e494f55435927a1b1a3e45",
  measurementId:"G-JQLCFRE19Z"

let db=null,firebaseReady=false;
try{

  const isReal=k&&k.length>20&&!k.includes('...')&&k!=="YOUR_API_KEY";

<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo}=React;

const LS='ncau-kanban-v9';
const FB='kanban_v5';
const JIRA='https://newscorpaustralia.atlassian.net/browse';
const DEADLINE=new Date('2026-05-31');
const DAYS_LEFT=Math.max(0,Math.ceil((DEADLINE-Date.now())/864e5));

/* ── Status columns ── */
const STATUSES=[
  {key:'not-started', label:'Not Started', clr:'#6B7280', bg:'rgba(107,114,128,0.08)'},
  {key:'in-progress', label:'In Progress', clr:'#2563EB', bg:'rgba(37,99,235,0.08)'},
  {key:'blocked',     label:'Blocked',     clr:'#DC2626', bg:'rgba(220,38,38,0.08)'},
  {key:'on-hold',     label:'On Hold',     clr:'#D97706', bg:'rgba(217,119,6,0.08)'},
  {key:'done',        label:'Done',        clr:'#16A34A', bg:'rgba(22,163,74,0.08)'},
];

/* ── Pipeline tasks (13 per tool) ── */
const TASKS=[
  {id:'1.1',label:'1.1 Environment Setup'},
  {id:'1.2',label:'1.2 Story Sourcing & output set-up'},
  {id:'2.1',label:'2.1 Model Selection'},
  {id:'2.2',label:'2.2 Environment Setup #2'},
  {id:'2.3',label:'2.3 Benchmarking'},
  {id:'2.4',label:'2.4 Prompt QA + iteration hypercycle'},
  {id:'3.1',label:'3.1 Deployment to Artie Dev'},
  {id:'3.2',label:'3.2 Dev deployment Pass/Fail'},
  {id:'3.3',label:'3.3 Deployment to Methode PROD (BETA)'},
  {id:'3.4',label:'3.4 Methode UAT editorial beta testing'},
  {id:'3.5',label:'3.5 Confirm UAT results'},
  {id:'3.6',label:'3.6 Go/No-Go Confirmation'},
  {id:'3.7',label:'3.7 Deployment to PROD'},
];
const TASK_IX=Object.fromEntries(TASKS.map(t=>[t.id,t]));

/* ── Tools ── */
const TOOLS=[
  {id:'seo',       name:'SEO',               clr:'#F43F5E', phase:1, jira:'EC-17148'},
  {id:'standfirst',name:'Standfirst',         clr:'#EC4899', phase:1, jira:'EC-17150'},
  {id:'bullet',    name:'Bullet Points',      clr:'#A855F7', phase:1, jira:''},
  {id:'print-hl',  name:'Print Headline V2',  clr:'#8B5CF6', phase:2, jira:''},
  {id:'story',     name:'Storycutter',        clr:'#6366F1', phase:2, jira:'EC-17151'},
  {id:'ext-hl',    name:'Extended Headline',  clr:'#3B82F6', phase:2, jira:'EC-17152'},
  {id:'short-hl',  name:'Short Headline',     clr:'#0EA5E9', phase:3, jira:'EC-17153'},
  {id:'sports',    name:'Sports Preview',     clr:'#14B8A6', phase:3, jira:''},
  {id:'press',     name:'Press Release',      clr:'#22C55E', phase:3, jira:''},
];
const TOOL_IX=Object.fromEntries(TOOLS.map(t=>[t.id,t]));

const TEAM=[
  {name:'Erin Nixon',ini:'EN',clr:'#EC4899'},
  {name:'Tony',      ini:'TO',clr:'#6366F1'},
  {name:'Sayee',     ini:'SS',clr:'#8B5CF6'},
  {name:'Rocky',     ini:'RO',clr:'#F59E0B'},
  {name:'Neil',      ini:'NE',clr:'#14B8A6'},
  {name:'Hanz',      ini:'HZ',clr:'#10B981'},
];
const TEAM_IX=Object.fromEntries(TEAM.map(m=>[m.name,m]));

/* ── Default card data from 2026 Migration Tracker ── */
/* Compact encoding: d=done, p=in-progress, b=blocked, n=not-started */
const SC={d:'done',p:'in-progress',b:'blocked',n:'not-started',h:'on-hold'};
const INIT_STATUS={
  'seo':       'ddddddbnnnnnn',
  'standfirst':'ddddddbnnnnnn',
  'print-hl':  'dddddpnnnnnnn',
  'bullet':    'ddddpnnnnnnnn',
  'ext-hl':    'dpnnnnnnnnnnn',
  'story':     'ddddnnnnnnnnn',
  'short-hl':  'dpnnnnnnnnnnn',
  'sports':    'dbnnnnnnnnnnn',
  'press':     'dbnnnnnnnnnnn',
};

function defaults(){
  const cards=[];
  for(const tool of TOOLS){
    const codes=INIT_STATUS[tool.id]||'nnnnnnnnnnnnn';
    TASKS.forEach((task,i)=>{
      cards.push({
        id:tool.id+'__'+task.id,
        toolId:tool.id,
        taskId:task.id,
        status:SC[codes[i]]||'not-started',
        notes:'',
        assignee:tool.id==='story'?'Erin Nixon':tool.id==='print-hl'?'Sayee':tool.id==='bullet'?'Rocky':tool.id==='seo'||tool.id==='standfirst'?'Hanz':tool.id==='sports'||tool.id==='press'?'Sayee':'Tony',
        lastUpdated:new Date().toISOString(),
      });
    });
  }
  return cards;
}

/* ── Firebase sync ── */
function useSync(){
  const[ss,setSS]=useState(firebaseReady?'connecting':'local');
  const rr=useRef([]);
  const wr=useCallback((p,d)=>{if(db)db.ref(FB+'/'+p).set(d).catch(()=>setSS('disconnected'));},[]);
  const li=useCallback((p,cb)=>{
    if(!db)return()=>{};
    const ref=db.ref(FB+'/'+p);
    ref.on('value',s=>{setSS('connected');cb(s.val());},()=>{setSS('disconnected');cb(null);});
    rr.current.push(ref);return()=>ref.off();
  },[]);
  useEffect(()=>{if(!db)return;const r=db.ref('.info/connected');r.on('value',s=>setSS(s.val()?'connected':'disconnected'));return()=>{r.off();rr.current.forEach(r=>r.off());};},[]);
  return{ss,wr,li,fb:firebaseReady};
}

const fmtRel=iso=>{const d=new Date(iso);const m=Math.floor((Date.now()-d)/6e4);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});};

/* ── Avatar ── */
const Av=({name,sz=16})=>{
  const m=TEAM_IX[name];
  return<div title={name} style={{width:sz,height:sz,fontSize:sz*.42,background:m?.clr||'#9CA3AF',borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,flexShrink:0}}>{m?.ini||(name||'?').slice(0,2).toUpperCase()}</div>;
};

/* ── KPIs ── */
const KPIs=({cards})=>{
  const total=cards.length;
  const done=cards.filter(c=>c.status==='done').length;
  const prog=cards.filter(c=>c.status==='in-progress').length;
  const blk=cards.filter(c=>c.status==='blocked').length;
  const hold=cards.filter(c=>c.status==='on-hold').length;
  const pct=total?Math.round(done/total*100):0;
  return<div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
    {[
      {l:'Overall',  v:pct+'%', c:blk>0?'#DC2626':'var(--accent)'},
      {l:'In Progress',v:prog,  c:'#2563EB'},
      {l:'Blocked',  v:blk,     c:blk?'#DC2626':'var(--t4)'},
      {l:'On Hold',  v:hold,    c:hold?'#D97706':'var(--t4)'},
      {l:'Done',     v:done+'/'+total, c:'#16A34A'},
    ].map(m=><div key={m.l} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',flex:'1 1 70px',minWidth:65,boxShadow:'var(--sh)'}}>
      <div style={{fontSize:9,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.09em',marginBottom:4}}>{m.l}</div>
      <div style={{fontSize:18,fontWeight:700,color:m.c,fontVariantNumeric:'tabular-nums',lineHeight:1}}>{m.v}</div>
    </div>)}
  </div>;
};

/* ── Task Card ──
   Hero: Task name (what work)
   Secondary: Tool name in tool colour (which product)
*/
const TaskCard=({card,onUpdate,onDragStart})=>{
  const[open,setOpen]=useState(false);
  const[ed,setEd]=useState(false);
  const[notes,setNotes]=useState(card.notes);
  const[assignee,setAs]=useState(card.assignee);
  const tool=TOOL_IX[card.toolId];
  const task=TASK_IX[card.taskId];
  if(!tool||!task)return null;

  const save=()=>{
    const ch={};
    if(notes!==card.notes)ch.notes=notes;
    if(assignee!==card.assignee)ch.assignee=assignee;
    if(Object.keys(ch).length)onUpdate(card.id,ch);
    setEd(false);setOpen(false);
  };

  return<div draggable onDragStart={e=>{onDragStart(e,card.id);e.dataTransfer.effectAllowed='move';}}
    style={{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${tool.clr}`,borderRadius:8,padding:'9px 10px 8px',display:'flex',flexDirection:'column',gap:6,cursor:'grab',transition:'box-shadow .12s',boxShadow:'var(--card-sh)'}}
    onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 3px 14px rgba(0,0,0,0.10)';}}
    onMouseLeave={e=>{e.currentTarget.style.boxShadow='var(--card-sh)';}}>

    {/* Task name — hero */}
    <span onClick={()=>{setOpen(!open);if(ed)setEd(false);}}
      style={{fontSize:12,fontWeight:700,color:'var(--t1)',lineHeight:'16px',cursor:'pointer',letterSpacing:'-.01em'}}>
      {task.label}
    </span>

    {/* Tool name — secondary, in tool colour */}
    <div style={{display:'flex',alignItems:'center',gap:5}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:tool.clr,flexShrink:0}}/>
      <span style={{fontSize:10,fontWeight:700,color:tool.clr,letterSpacing:'-.01em'}}>{tool.name}</span>
      <span style={{fontSize:9,color:'var(--t3)',marginLeft:'auto'}}>{fmtRel(card.lastUpdated)}</span>
    </div>

    {/* Assignee row */}
    <div style={{display:'flex',alignItems:'center',gap:5}}>
      <Av name={card.assignee} sz={14}/>
      <span style={{fontSize:10,color:'var(--t2)'}}>{card.assignee}</span>
    </div>

    {/* Notes preview */}
    {!open&&card.notes&&<span style={{fontSize:10,color:'var(--t3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{card.notes}</span>}

    {/* Expanded */}
    {open&&!ed&&<div style={{display:'flex',flexDirection:'column',gap:6,borderTop:'1px solid var(--border-s)',paddingTop:6}}>
      {card.notes&&<p style={{fontSize:11,color:'var(--t1)',lineHeight:'16px'}}>{card.notes}</p>}
      {tool.jira&&<a href={JIRA+'/'+tool.jira} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:'var(--accent)',textDecoration:'none',fontWeight:600}}>{tool.jira} ↗</a>}
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontSize:10,color:'var(--t2)',fontWeight:500}}>Move to:</span>
        <select value={card.status} onChange={e=>onUpdate(card.id,{status:e.target.value})} style={{fontSize:10,flex:1,background:'var(--surface)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:4,padding:'3px 5px',outline:'none'}}>
          {STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
        </select>
      </div>
      <button onClick={()=>{setEd(true);setNotes(card.notes);setAs(card.assignee);}} style={{fontSize:9,fontWeight:700,color:'var(--accent)',background:'none',border:'none',cursor:'pointer',textAlign:'left',padding:0,letterSpacing:'.04em'}}>EDIT</button>
    </div>}

    {/* Edit */}
    {ed&&<div style={{display:'flex',flexDirection:'column',gap:6,borderTop:'1px solid var(--border-s)',paddingTop:6}} onClick={e=>e.stopPropagation()}>
      <div><div style={{fontSize:9,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>Assignee</div>
        <select value={assignee} onChange={e=>setAs(e.target.value)} style={iSt}>{TEAM.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}</select></div>
      <div><div style={{fontSize:9,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>Notes</div>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...iSt,resize:'none'}}/></div>
      <div style={{display:'flex',gap:6}}>
        <button onClick={save} style={{flex:1,fontSize:10,fontWeight:700,background:'var(--accent)',color:'#fff',padding:'5px 0',borderRadius:5,border:'none',cursor:'pointer'}}>Save</button>
        <button onClick={()=>setEd(false)} style={{flex:1,fontSize:10,fontWeight:600,background:'transparent',color:'var(--t2)',padding:'5px 0',borderRadius:5,border:'1px solid var(--border-s)',cursor:'pointer'}}>Cancel</button>
      </div>
    </div>}
  </div>;
};
const iSt={width:'100%',fontSize:11,padding:'4px 6px',background:'var(--surface)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:5,outline:'none'};

/* ── Board ── */
const Board=({cards,onUpdate})=>{
  const[dragOver,setDO]=useState(null);
  const dragId=useRef(null);
  const onDS=useCallback((e,id)=>{dragId.current=id;e.dataTransfer.setData('text/plain',id);},[]);
  const onDrop=useCallback((e,key)=>{
    e.preventDefault();setDO(null);
    const id=e.dataTransfer.getData('text/plain')||dragId.current;
    if(id)onUpdate(id,{status:key});
    dragId.current=null;
  },[onUpdate]);

  return<div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:10,flex:1,minHeight:0,alignItems:'stretch'}}>
    {STATUSES.map(status=>{
      const col=cards.filter(c=>c.status===status.key);
      const isO=dragOver===status.key;
      return<div key={status.key}
        style={{flexShrink:0,flex:'1 1 0',minWidth:200,maxWidth:320,display:'flex',flexDirection:'column',background:'var(--surface)',border:`1px solid ${isO?status.clr:'var(--border)'}`,borderRadius:10,transition:'border-color .15s',boxShadow:isO?`0 0 0 2px ${status.bg}`:'var(--sh)',overflow:'hidden'}}
        onDragOver={e=>{e.preventDefault();setDO(status.key);}} onDragLeave={()=>setDO(null)} onDrop={e=>onDrop(e,status.key)}>

        <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border-s)',display:'flex',alignItems:'center',gap:7,background:'var(--card)',flexShrink:0}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:status.clr,flexShrink:0}}/>
          <span style={{fontSize:12,fontWeight:700,color:'var(--t1)',flex:1}}>{status.label}</span>
          <span style={{fontSize:10,fontWeight:700,color:status.clr,background:status.bg,padding:'1px 7px',borderRadius:99,border:`1px solid ${status.clr}25`}}>{col.length}</span>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:8,display:'flex',flexDirection:'column',gap:8}}>
          {col.map(c=><TaskCard key={c.id} card={c} onUpdate={onUpdate} onDragStart={onDS}/>)}
          {col.length===0&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:56,fontSize:11,color:'var(--t4)',border:'1px dashed var(--border-s)',borderRadius:6}}>Drop here</div>}
        </div>
      </div>;
    })}
  </div>;
};

/* ── Filters ── */
const Filters=({f,set,clear,cnt})=>{
  const s={fontSize:11,padding:'4px 8px',background:'var(--card)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:6,outline:'none',height:28};
  return<div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:12}}>
    <select value={f.tool} onChange={e=>set('tool',e.target.value)} style={{...s,fontWeight:f.tool?700:400}}>
      <option value="">All Tools</option>
      {TOOLS.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
    </select>
    <select value={f.phase} onChange={e=>set('phase',e.target.value)} style={s}><option value="">All Phases</option><option value="1">Phase 1</option><option value="2">Phase 2</option><option value="3">Phase 3</option></select>
    <select value={f.assignee} onChange={e=>set('assignee',e.target.value)} style={s}><option value="">All Owners</option>{TEAM.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}</select>
    <label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--t2)',cursor:'pointer',height:28}}><input type="checkbox" checked={f.hideDone} onChange={e=>set('hideDone',e.target.checked)}/> Hide Done</label>
    <label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--t2)',cursor:'pointer',height:28}}><input type="checkbox" checked={f.hideNS} onChange={e=>set('hideNS',e.target.checked)}/> Hide Not Started</label>
    {cnt>0&&<button onClick={clear} style={{fontSize:10,fontWeight:700,color:'var(--accent)',background:'var(--accent-bg)',padding:'0 10px',borderRadius:6,border:'none',cursor:'pointer',height:28}}>Clear ({cnt})</button>}
  </div>;
};

/* ── Header ── */
const Header=({ss,onReset,onCsv,light,onToggle})=>(
  <header style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:16,flexWrap:'wrap',gap:10}}>
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:32,height:32,borderRadius:8,background:'#4F46E5',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <span style={{color:'#fff',fontSize:9,fontWeight:800,letterSpacing:'.05em'}}>NCA</span>
      </div>
      <div>
        <h1 style={{fontSize:16,fontWeight:700,color:'var(--t1)',letterSpacing:'-.02em',lineHeight:1}}>E2E Model Migration</h1>
        <p style={{fontSize:10,color:'var(--t2)',marginTop:2}}>Editorial AI — Pipeline Kanban</p>
      </div>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--card)',padding:'5px 14px',borderRadius:999,border:'1px solid var(--border-s)',boxShadow:'var(--sh)'}}>
      <span style={{fontSize:12,fontWeight:700,color:DAYS_LEFT<30?'#DC2626':DAYS_LEFT<60?'#D97706':'var(--t1)'}}>{DAYS_LEFT} days</span>
      <span style={{fontSize:11,color:'var(--t3)'}}>· May 2026</span>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      {[{l:light?'Dark':'Light',fn:onToggle},{l:'CSV',fn:onCsv},{l:'Reset',fn:()=>{if(confirm('Reset to defaults?'))onReset();}}].map(b=>
        <button key={b.l} onClick={b.fn} style={{fontSize:10,fontWeight:600,padding:'0 12px',background:'var(--card)',border:'1px solid var(--border-s)',color:'var(--t2)',borderRadius:6,cursor:'pointer',height:28}}>{b.l}</button>
      )}
      <div style={{display:'flex',alignItems:'center',gap:5,background:'var(--card)',border:'1px solid var(--border-s)',padding:'0 10px',borderRadius:6,height:28}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:ss==='connected'?'#16A34A':ss==='disconnected'?'#DC2626':'#9CA3AF'}}/>
        <span style={{fontSize:9,fontWeight:700,color:ss==='connected'?'#16A34A':ss==='disconnected'?'#DC2626':'var(--t2)',letterSpacing:'.05em'}}>{ss==='connected'?'LIVE':ss==='disconnected'?'OFFLINE':'LOCAL'}</span>
      </div>
    </div>
  </header>
);

/* ── CSV ── */
function doCSV(cards){
  const esc=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;};
  const h=['Task','Tool','Phase','Status','Assignee','Notes','Updated'];
  const rows=cards.map(c=>{const t=TOOL_IX[c.toolId];const tk=TASK_IX[c.taskId];const st=STATUSES.find(s=>s.key===c.status);return[tk?.label,t?.name,t?.phase,st?.label,c.assignee,c.notes,new Date(c.lastUpdated).toLocaleString('en-AU')];});
  const out=[h.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))].join('\r\n');
  const b=new Blob(['\uFEFF'+out],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nca-migration-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);
}

/* ── App ── */
const EF={tool:'',phase:'',assignee:'',hideDone:false,hideNS:false};
const App=()=>{
  const[cards,setCards]=useState([]);
  const[loading,setLoading]=useState(true);
  const[f,setF]=useState(EF);
  const skip=useRef(false);
  const[light,setLight]=useState(()=>{try{return localStorage.getItem('nca-theme')!=='dark';}catch{return true;}});
  useEffect(()=>{document.body.classList.toggle('dark',!light);try{localStorage.setItem('nca-theme',light?'light':'dark');}catch{}},[light]);

  const{ss,wr,li,fb}=useSync();
  const persist=useCallback(c=>{try{localStorage.setItem(LS,JSON.stringify(c));}catch{}if(fb){skip.current=true;wr('cards',c);}},[fb,wr]);

  useEffect(()=>{
    if(fb){
      return li('cards',data=>{
        if(skip.current){skip.current=false;return;}
        const c=data&&Array.isArray(data)?data:data?Object.values(data):null;
        setCards(c||defaults());
        if(!c)wr('cards',defaults());
        setLoading(false);
      });
    }else{
      try{const r=localStorage.getItem(LS);setCards(r?JSON.parse(r):defaults());}catch{setCards(defaults());}
      setLoading(false);
    }
  },[fb,li,wr]);

  const update=useCallback((id,ch)=>{
    setCards(prev=>{const next=prev.map(c=>c.id===id?{...c,...ch,lastUpdated:new Date().toISOString()}:c);persist(next);return next;});
  },[persist]);

  const reset=useCallback(()=>{const d=defaults();setCards(d);persist(d);},[persist]);

  const filtered=useMemo(()=>{
    let r=[...cards];
    if(f.tool)     r=r.filter(c=>c.toolId===f.tool);
    if(f.phase)    r=r.filter(c=>TOOL_IX[c.toolId]?.phase===Number(f.phase));
    if(f.assignee) r=r.filter(c=>c.assignee===f.assignee);
    if(f.hideDone) r=r.filter(c=>c.status!=='done');
    if(f.hideNS)   r=r.filter(c=>c.status!=='not-started');
    return r;
  },[cards,f]);

  const cnt=Object.entries(f).filter(([k,v])=>typeof v==='boolean'?v:v!=='').length;

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)'}}><span style={{color:'var(--t3)',fontSize:13,fontWeight:500}}>Loading board…</span></div>;

  return<div style={{display:'flex',flexDirection:'column',height:'100vh',padding:'20px 24px 10px',maxWidth:2400,margin:'0 auto'}}>
    <Header ss={ss} onReset={reset} onCsv={()=>doCSV(cards)} light={light} onToggle={()=>setLight(p=>!p)}/>
    <KPIs cards={cards}/>
    <Filters f={f} set={(k,v)=>setF(p=>({...p,[k]:v}))} clear={()=>setF(EF)} cnt={cnt}/>
    <Board cards={filtered} onUpdate={update}/>
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
