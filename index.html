<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo}=React;

const LS='ncau-kanban-v7';
const FB='kanban_v3';
const JIRA='https://newscorpaustralia.atlassian.net/browse';
const DEADLINE=new Date('2026-05-31');
const DAYS_LEFT=Math.max(0,Math.ceil((DEADLINE-Date.now())/864e5));

const STAGES=[
  {key:'baseline',  label:'Baseline Analysis'},
  {key:'model-sel', label:'Model Selection'},
  {key:'prompt',    label:'Prompt Engineering'},
  {key:'benchmark', label:'Benchmarking'},
  {key:'qa',        label:'QA & Safety'},
  {key:'artie-dev', label:'Artie Dev Deploy'},
  {key:'uat',       label:'UAT'},
  {key:'prod',      label:'Production'},
];
const STAGE_IX=Object.fromEntries(STAGES.map((s,i)=>[s.key,{...s,i}]));

const TOOLS=[
  {id:'seo',       name:'SEO',               clr:'#f43f5e',phase:1,jira:'EC-17148',owner:'Tony'},
  {id:'standfirst',name:'Standfirst',         clr:'#ec4899',phase:1,jira:'EC-17150',owner:'Tony'},
  {id:'bullet',    name:'Bullet Points',      clr:'#a855f7',phase:1,jira:'',        owner:'Rocky'},
  {id:'print-hl',  name:'Print Headline V2',  clr:'#8b5cf6',phase:2,jira:'',        owner:'Sayee'},
  {id:'story',     name:'Storycutter',        clr:'#6366f1',phase:2,jira:'EC-17151',owner:'Erin Nixon'},
  {id:'ext-hl',    name:'Extended Headline',  clr:'#3b82f6',phase:3,jira:'EC-17152',owner:'Tony'},
  {id:'short-hl',  name:'Short Headline',     clr:'#0ea5e9',phase:3,jira:'EC-17153',owner:'Tony'},
  {id:'sports',    name:'Sports Preview',     clr:'#14b8a6',phase:3,jira:'',        owner:'Tony'},
  {id:'press',     name:'Press Release',      clr:'#22c55e',phase:3,jira:'',        owner:'Tony'},
];
const TOOL_IX=Object.fromEntries(TOOLS.map(t=>[t.id,t]));

const TEAM=[
  {name:'Erin Nixon',ini:'EN',clr:'#ec4899'},
  {name:'Tony',      ini:'TO',clr:'#6366f1'},
  {name:'Sayee',     ini:'SS',clr:'#8b5cf6'},
  {name:'Rocky',     ini:'RO',clr:'#f59e0b'},
  {name:'Neil',      ini:'NE',clr:'#14b8a6'},
  {name:'Hanz',      ini:'HZ',clr:'#10b981'},
];
const TEAM_IX=Object.fromEntries(TEAM.map(m=>[m.name,m]));

const RAG={
  green:{bg:'#CDFADF',text:'#16803C'},
  amber:{bg:'#FFF0DB',text:'#C2670A'},
  red:  {bg:'#FFE2E5',text:'#DC2626'},
};

function defaults(){
  return[
    {id:'seo',       stage:'artie-dev',assignee:'Hanz',      rag:'amber',blocked:true, comment:'Ready for Artie Dev. On hold pending infra.'},
    {id:'standfirst',stage:'artie-dev',assignee:'Hanz',      rag:'amber',blocked:true, comment:'Ready for Artie Dev. On hold pending infra.'},
    {id:'bullet',    stage:'prompt',   assignee:'Rocky',     rag:'green',blocked:false,comment:'Claude 4.6 selected. Benchmarking next.'},
    {id:'print-hl',  stage:'prompt',   assignee:'Sayee',     rag:'amber',blocked:false,comment:'Character count issues being ironed out.'},
    {id:'story',     stage:'model-sel',assignee:'Erin Nixon',rag:'green',blocked:false,comment:'Gemini 3.1 likely model. No benchmark needed.'},
    {id:'ext-hl',    stage:'baseline', assignee:'Tony',      rag:'green',blocked:false,comment:'Scoring tool being updated across 6 models.'},
    {id:'short-hl',  stage:'baseline', assignee:'Tony',      rag:'green',blocked:false,comment:'Scoring tool being updated across 6 models.'},
    {id:'sports',    stage:'baseline', assignee:'Tony',      rag:'red',  blocked:true, comment:'On hold pending legal confirmation.'},
    {id:'press',     stage:'baseline', assignee:'Tony',      rag:'red',  blocked:true, comment:'On hold pending legal confirmation.'},
  ].map(c=>({...c,lastUpdated:new Date().toISOString()}));
}

/* ── Firebase sync ── */
function useSync(){
  const[ss,setSS]=useState(firebaseReady?'connecting':'local');
  const rr=useRef([]);
  const wr=useCallback((p,d)=>{if(db)db.ref(FB+'/'+p).set(d).catch(()=>setSS('disconnected'));},[]);
  const li=useCallback((p,cb)=>{
    if(!db)return()=>{};
    const ref=db.ref(FB+'/'+p);
    ref.on('value',s=>{setSS('connected');cb(s.val());},()=>{setSS('disconnected');cb(null);});
    rr.current.push(ref);
    return()=>ref.off();
  },[]);
  useEffect(()=>{
    if(!db)return;
    const r=db.ref('.info/connected');
    r.on('value',s=>setSS(s.val()?'connected':'disconnected'));
    return()=>{r.off();rr.current.forEach(r=>r.off());};
  },[]);
  return{ss,wr,li,fb:firebaseReady};
}

const fmtRel=iso=>{
  const d=new Date(iso);
  const m=Math.floor((Date.now()-d)/6e4);
  if(m<1)return'now';if(m<60)return m+'m';
  const h=Math.floor(m/60);if(h<24)return h+'h';
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
};

/* ── Avatar ── */
const Av=({name,sz=20})=>{
  const m=TEAM_IX[name];
  return<div title={name} style={{width:sz,height:sz,fontSize:sz*.42,background:m?.clr||'var(--t4)',borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,flexShrink:0}}>
    {m?.ini||(name||'?').slice(0,2).toUpperCase()}
  </div>;
};

/* ── Status panel ── */
const StatusPanel=({cards})=>{
  const done   =cards.filter(c=>c.stage==='prod').length;
  const blocked=cards.filter(c=>c.blocked).length;
  const active =cards.length-done-blocked;
  const pct    =cards.length?Math.round(cards.reduce((s,c)=>s+(STAGE_IX[c.stage]?.i??0),0)/(cards.length*(STAGES.length-1))*100):0;
  return<div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
    {[
      {l:'Overall Progress',v:pct+'%',c:blocked>0?'#DC2626':'var(--accent)'},
      {l:'Active Tools',    v:active,  c:'var(--accent)'},
      {l:'Completed',       v:done,    c:'#16803C'},
      {l:'Blocked',         v:blocked, c:blocked?'#DC2626':'var(--t4)'},
    ].map(m=><div key={m.l} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 18px',flex:'1 1 90px',minWidth:80,boxShadow:'var(--sh)'}}>
      <div style={{fontSize:10,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.09em',marginBottom:6}}>{m.l}</div>
      <div style={{fontSize:22,fontWeight:700,color:m.c,fontVariantNumeric:'tabular-nums',lineHeight:1}}>{m.v}</div>
    </div>)}
  </div>;
};

/* ── Tool Card ── */
const ToolCard=({card,onUpdate,onDragStart})=>{
  const[open,setOpen]=useState(false);
  const[ed,setEd]=useState(false);
  const[comment,setCom]=useState(card.comment);
  const[assignee,setAs]=useState(card.assignee);
  const[rag,setRag]=useState(card.rag);
  const[blocked,setBl]=useState(card.blocked);
  const tool=TOOL_IX[card.id];
  if(!tool)return null;

  const save=()=>{
    const ch={};
    if(comment!==card.comment)ch.comment=comment;
    if(assignee!==card.assignee)ch.assignee=assignee;
    if(rag!==card.rag)ch.rag=rag;
    if(blocked!==card.blocked)ch.blocked=blocked;
    if(Object.keys(ch).length)onUpdate(card.id,ch);
    setEd(false);setOpen(false);
  };

  return<div draggable onDragStart={e=>{onDragStart(e,card.id);e.dataTransfer.effectAllowed='move';}}
    style={{position:'relative',background:'var(--card)',border:'1px solid var(--border-s)',borderLeft:`3px solid ${tool.clr}`,borderRadius:10,padding:'13px 13px 11px',display:'flex',flexDirection:'column',gap:10,cursor:'grab',transition:'box-shadow .15s,background .1s',boxShadow:'var(--card-sh)'}}
    onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 18px rgba(0,0,0,0.10)';e.currentTarget.style.background='var(--card-h)';}}
    onMouseLeave={e=>{e.currentTarget.style.boxShadow='var(--card-sh)';e.currentTarget.style.background='var(--card)';}}>

    {/* Tags */}
    <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
      <span style={{background:'var(--accent-bg)',color:'var(--accent)',padding:'3px 8px',borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:'.03em'}}>PH {tool.phase}</span>
      <span style={{background:RAG[card.rag].bg,color:RAG[card.rag].text,padding:'3px 8px',borderRadius:4,fontSize:10,fontWeight:700,textTransform:'capitalize'}}>{card.rag}</span>
      {card.blocked&&<span style={{background:'#FFE2E5',color:'#DC2626',padding:'3px 8px',borderRadius:4,fontSize:10,fontWeight:700}}>Blocked</span>}
    </div>

    {/* Tool name + note */}
    <div style={{display:'flex',flexDirection:'column',gap:3}}>
      <span onClick={()=>{setOpen(!open);if(ed)setEd(false);}}
        style={{fontSize:14,fontWeight:700,color:'var(--t1)',lineHeight:'20px',cursor:'pointer',letterSpacing:'-.01em'}}>
        {tool.name}
      </span>
      {!open&&<span style={{fontSize:11,color:'var(--t2)',lineHeight:'16px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {card.comment||'No notes added.'}
      </span>}
    </div>

    {/* Expanded view */}
    {open&&!ed&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
      <div style={{height:1,background:'var(--border-s)'}}/>
      {card.comment&&<p style={{fontSize:12,color:'var(--t1)',lineHeight:'18px'}}>{card.comment}</p>}
      {tool.jira&&<a href={JIRA+'/'+tool.jira} target="_blank" rel="noopener noreferrer"
        style={{fontSize:11,color:'var(--accent)',textDecoration:'none',fontWeight:600}}>{tool.jira} ↗</a>}
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:11,color:'var(--t2)',fontWeight:500,flexShrink:0}}>Move to:</span>
        <select value={card.stage} onChange={e=>onUpdate(card.id,{stage:e.target.value})}
          style={{fontSize:11,flex:1,background:'var(--surface)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:6,padding:'4px 6px',outline:'none'}}>
          {STAGES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
        </select>
      </div>
      <button onClick={()=>{setEd(true);setCom(card.comment);setAs(card.assignee);setRag(card.rag);setBl(card.blocked);}}
        style={{fontSize:10,fontWeight:700,color:'var(--accent)',background:'none',border:'none',cursor:'pointer',textAlign:'left',padding:0,letterSpacing:'.04em'}}>
        EDIT DETAILS
      </button>
    </div>}

    {/* Edit form */}
    {ed&&<div style={{display:'flex',flexDirection:'column',gap:8}} onClick={e=>e.stopPropagation()}>
      <div style={{height:1,background:'var(--border-s)'}}/>
      {[
        {l:'Assignee',el:<select value={assignee} onChange={e=>setAs(e.target.value)} style={iSt}>{TEAM.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}</select>},
        {l:'RAG',     el:<select value={rag} onChange={e=>setRag(e.target.value)} style={iSt}><option value="green">Green</option><option value="amber">Amber</option><option value="red">Red</option></select>},
        {l:'Blocked', el:<label style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--t1)',cursor:'pointer'}}><input type="checkbox" checked={blocked} onChange={e=>setBl(e.target.checked)}/> Mark as blocked</label>},
        {l:'Note',    el:<textarea value={comment} onChange={e=>setCom(e.target.value)} rows={2} style={{...iSt,resize:'none'}}/>},
      ].map(r=><div key={r.l}><div style={lSt}>{r.l}</div>{r.el}</div>)}
      <div style={{display:'flex',gap:8,marginTop:2}}>
        <button onClick={save} style={{flex:1,fontSize:11,fontWeight:700,background:'var(--accent)',color:'#fff',padding:'7px 0',borderRadius:6,border:'none',cursor:'pointer'}}>Save</button>
        <button onClick={()=>setEd(false)} style={{flex:1,fontSize:11,fontWeight:600,background:'transparent',color:'var(--t2)',padding:'7px 0',borderRadius:6,border:'1px solid var(--border-s)',cursor:'pointer'}}>Cancel</button>
      </div>
    </div>}

    {/* Footer */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:7}}>
        <Av name={card.assignee} sz={18}/>
        <span style={{fontSize:11,color:'var(--t2)',fontWeight:500}}>{card.assignee||'Unassigned'}</span>
      </div>
      <span style={{fontSize:11,color:'var(--t3)'}}>{fmtRel(card.lastUpdated)}</span>
    </div>
  </div>;
};

const lSt={fontSize:10,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4,display:'block'};
const iSt={width:'100%',fontSize:11,padding:'5px 8px',background:'var(--surface)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:6,outline:'none'};

/* ── Board ── */
const Board=({cards,onUpdate})=>{
  const[dragOver,setDO]=useState(null);
  const dragId=useRef(null);
  const onDS=useCallback((e,id)=>{dragId.current=id;e.dataTransfer.setData('text/plain',id);},[]);
  const onDrop=useCallback((e,key)=>{
    e.preventDefault();setDO(null);
    const id=e.dataTransfer.getData('text/plain')||dragId.current;
    if(id)onUpdate(id,{stage:key});
    dragId.current=null;
  },[onUpdate]);

  return<div style={{display:'flex',gap:14,overflowX:'auto',paddingBottom:12,flex:1,minHeight:0,alignItems:'flex-start'}}>
    {STAGES.map((stage,si)=>{
      const col=cards.filter(c=>c.stage===stage.key);
      const isO=dragOver===stage.key;
      return<div key={stage.key}
        style={{flexShrink:0,width:238,display:'flex',flexDirection:'column',background:'var(--surface)',border:`1px solid ${isO?'var(--accent)':'var(--border)'}`,borderRadius:12,transition:'border-color .15s,box-shadow .15s',boxShadow:isO?'0 0 0 3px var(--accent-bg)':'var(--sh)',overflow:'hidden'}}
        onDragOver={e=>{e.preventDefault();setDO(stage.key);}} onDragLeave={()=>setDO(null)} onDrop={e=>onDrop(e,stage.key)}>

        {/* Column header */}
        <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border-s)',display:'flex',alignItems:'center',gap:8,background:'var(--card)'}}>
          <span style={{fontSize:9,fontWeight:800,color:'var(--accent)',background:'var(--accent-bg)',width:18,height:18,borderRadius:4,display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{si+1}</span>
          <span style={{fontSize:11,fontWeight:700,color:'var(--t1)',flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{stage.label}</span>
          {col.length>0&&<span style={{fontSize:10,fontWeight:700,color:'var(--t2)',background:'var(--bg)',padding:'1px 7px',borderRadius:99,flexShrink:0,border:'1px solid var(--border-s)'}}>{col.length}</span>}
        </div>

        {/* Cards */}
        <div style={{flex:1,overflowY:'auto',padding:'10px',display:'flex',flexDirection:'column',gap:10}}>
          {col.map(c=><ToolCard key={c.id} card={c} onUpdate={onUpdate} onDragStart={onDS}/>)}
          {col.length===0&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:56,fontSize:11,color:'var(--t4)',border:'1px dashed var(--border-s)',borderRadius:8}}>Drop here</div>}
        </div>
      </div>;
    })}
  </div>;
};

/* ── Filters ── */
const Filters=({f,set,clear,cnt})=>{
  const s={fontSize:12,padding:'5px 10px',background:'var(--card)',border:'1px solid var(--border-s)',color:'var(--t1)',borderRadius:8,outline:'none',height:30};
  return<div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:14}}>
    <input placeholder="Search tools or owner…" value={f.q} onChange={e=>set('q',e.target.value)} style={{...s,width:170}}/>
    <select value={f.phase}    onChange={e=>set('phase',e.target.value)}    style={s}><option value="">All Phases</option><option value="1">Phase 1</option><option value="2">Phase 2</option><option value="3">Phase 3</option></select>
    <select value={f.rag}      onChange={e=>set('rag',e.target.value)}      style={s}><option value="">All RAG</option><option value="green">Green</option><option value="amber">Amber</option><option value="red">Red</option></select>
    <select value={f.assignee} onChange={e=>set('assignee',e.target.value)} style={s}><option value="">All Owners</option>{TEAM.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}</select>
    <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'var(--t1)',cursor:'pointer',height:30}}><input type="checkbox" checked={f.blocked} onChange={e=>set('blocked',e.target.checked)}/> Blocked</label>
    {cnt>0&&<button onClick={clear} style={{fontSize:11,fontWeight:700,color:'var(--accent)',background:'var(--accent-bg)',padding:'0 12px',borderRadius:8,border:'none',cursor:'pointer',height:30}}>Clear ({cnt})</button>}
  </div>;
};

/* ── Header ── */
const Header=({ss,onReset,onCsv,light,onToggle})=>(
  <header style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:20,flexWrap:'wrap',gap:12}}>
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <div style={{width:36,height:36,borderRadius:10,background:'#625B71',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <span style={{color:'#fff',fontSize:10,fontWeight:800,letterSpacing:'.05em'}}>NCA</span>
      </div>
      <div>
        <h1 style={{fontSize:18,fontWeight:700,color:'var(--t1)',letterSpacing:'-.02em',lineHeight:1}}>E2E Model Migration</h1>
        <p style={{fontSize:11,color:'var(--t2)',marginTop:3}}>Editorial AI — Pipeline Kanban</p>
      </div>
    </div>

    {/* Days remaining */}
    <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--card)',padding:'7px 16px',borderRadius:999,border:'1px solid var(--border-s)',boxShadow:'var(--sh)'}}>
      <span style={{fontSize:13,fontWeight:700,color:DAYS_LEFT<30?'#DC2626':DAYS_LEFT<60?'#C2670A':'var(--t1)'}}>{DAYS_LEFT} days remaining</span>
      <span style={{fontSize:12,color:'var(--t3)'}}>· May 2026</span>
    </div>

    <div style={{display:'flex',alignItems:'center',gap:8}}>
      {[{l:light?'Dark':'Light',fn:onToggle},{l:'CSV',fn:onCsv},{l:'Reset',fn:()=>{if(confirm('Reset to defaults?'))onReset();}}].map(b=>
        <button key={b.l} onClick={b.fn} style={{fontSize:11,fontWeight:600,padding:'0 14px',background:'var(--card)',border:'1px solid var(--border-s)',color:'var(--t2)',borderRadius:8,cursor:'pointer',height:30}}>{b.l}</button>
      )}
      <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--card)',border:'1px solid var(--border-s)',padding:'0 12px',borderRadius:8,height:30}}>
        <span style={{width:7,height:7,borderRadius:'50%',flexShrink:0,background:ss==='connected'?'#16803C':ss==='disconnected'?'#DC2626':'#D8D8D8'}}/>
        <span style={{fontSize:10,fontWeight:700,color:ss==='connected'?'#16803C':ss==='disconnected'?'#DC2626':'var(--t2)',letterSpacing:'.05em'}}>{ss==='connected'?'LIVE':ss==='disconnected'?'OFFLINE':'LOCAL'}</span>
      </div>
    </div>
  </header>
);

/* ── CSV export ── */
function doCSV(cards){
  const esc=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;};
  const h=['Tool','Phase','Current Stage','RAG','Blocked','Assignee','Comment','Updated'];
  const rows=cards.map(c=>{const t=TOOL_IX[c.id];return[t?.name,t?.phase,STAGE_IX[c.stage]?.label,c.rag,c.blocked?'Yes':'No',c.assignee,c.comment,new Date(c.lastUpdated).toLocaleString('en-AU')];});
  const out=[h.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))].join('\r\n');
  const b=new Blob(['\uFEFF'+out],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nca-migration-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);
}

/* ── App ── */
const EF={q:'',phase:'',rag:'',assignee:'',blocked:false};
const App=()=>{
  const[cards,setCards]=useState([]);
  const[loading,setLoading]=useState(true);
  const[f,setF]=useState(EF);
  const skip=useRef(false);
  const[light,setLight]=useState(()=>{try{return localStorage.getItem('nca-theme')!=='dark';}catch{return true;}});
  useEffect(()=>{document.body.classList.toggle('dark',!light);try{localStorage.setItem('nca-theme',light?'light':'dark');}catch{}},[light]);

  const{ss,wr,li,fb}=useSync();
  const persist=useCallback(c=>{try{localStorage.setItem(LS,JSON.stringify(c));}catch{}if(fb){skip.current=true;wr('cards',c);}},[fb,wr]);

  useEffect(()=>{
    if(fb){
      return li('cards',data=>{
        if(skip.current){skip.current=false;return;}
        const c=data&&Array.isArray(data)?data:data?Object.values(data):null;
        setCards(c||defaults());
        if(!c)wr('cards',defaults());
        setLoading(false);
      });
    }else{
      try{const r=localStorage.getItem(LS);setCards(r?JSON.parse(r):defaults());}catch{setCards(defaults());}
      setLoading(false);
    }
  },[fb,li,wr]);

  const update=useCallback((id,ch)=>{
    setCards(prev=>{const next=prev.map(c=>c.id===id?{...c,...ch,lastUpdated:new Date().toISOString()}:c);persist(next);return next;});
  },[persist]);

  const reset=useCallback(()=>{const d=defaults();setCards(d);persist(d);},[persist]);

  const filtered=useMemo(()=>{
    let r=[...cards];
    if(f.q){const q=f.q.toLowerCase();r=r.filter(c=>(TOOL_IX[c.id]?.name||'').toLowerCase().includes(q)||(c.assignee||'').toLowerCase().includes(q));}
    if(f.phase)    r=r.filter(c=>TOOL_IX[c.id]?.phase===Number(f.phase));
    if(f.rag)      r=r.filter(c=>c.rag===f.rag);
    if(f.assignee) r=r.filter(c=>c.assignee===f.assignee);
    if(f.blocked)  r=r.filter(c=>c.blocked);
    return r;
  },[cards,f]);

  const cnt=Object.entries(f).filter(([k,v])=>k==='blocked'?v:v!=='').length;

  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)'}}><span style={{color:'var(--t3)',fontSize:13,fontWeight:500}}>Loading board…</span></div>;

  return<div style={{display:'flex',flexDirection:'column',height:'100vh',padding:'24px 28px 12px',maxWidth:2400,margin:'0 auto'}}>
    <Header ss={ss} onReset={reset} onCsv={()=>doCSV(cards)} light={light} onToggle={()=>setLight(p=>!p)}/>
    <StatusPanel cards={cards}/>
    <Filters f={f} set={(k,v)=>setF(p=>({...p,[k]:v}))} clear={()=>setF(EF)} cnt={cnt}/>
    <Board cards={filtered} onUpdate={update}/>
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
